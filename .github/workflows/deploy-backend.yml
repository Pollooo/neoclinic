name: Deploy Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'NeoClinic/NeoClinic.Api/**'
      - 'NeoClinic/NeoClinic.Application/**'
      - 'NeoClinic/NeoClinic.Domain/**'
      - 'NeoClinic/NeoClinic.Infrostructure/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore NeoClinic/NeoClinic.Api/NeoClinic.Api.csproj

      - name: Build
        run: dotnet build NeoClinic/NeoClinic.Api/NeoClinic.Api.csproj -c Release

      - name: Publish
        run: dotnet publish NeoClinic/NeoClinic.Api/NeoClinic.Api.csproj -c Release --no-build -o publish

      - name: Generate appsettings.json with secrets
        shell: pwsh
        env:
          DB: ${{ secrets.ConnectionStrings__Database }}
          JWT_KEY: ${{ secrets.Jwt__Key }}
          AZURE: ${{ secrets.AzureBlob__ConnectionString }}
          TEL_BOT: ${{ secrets.Telegram__BotToken }}
          TEL_CHAT: ${{ secrets.Telegram__ChatId }}
          TEL_STORAGE_BOT: ${{ secrets.TelegramStorage__BotToken }}
          TEL_STORAGE_CHAT: ${{ secrets.TelegramStorage__ChatId }}
        run: |
          python -c @"
          import json, os
          data = {
              "Logging": {"LogLevel": {"Default": "Information", "Microsoft.AspNetCore": "Warning"}},
              "ConnectionStrings": {"Database": os.environ["DB"]},
              "Firebase": {"CredentialsPath": "Keys/ServiceAccountKey.json", "BucketName": "clinic-c21c4.firebasestorage.app"},
              "Jwt": {"Key": os.environ["JWT_KEY"], "Issuer": "NeoClinic", "Audience": "NeoClinicUsers", "AccessTokenMinutes": 60},
              "AzureBlob": {"ConnectionString": os.environ["AZURE"], "ContainerName": "neo-clinic-docs"},
              "Telegram": {"BotToken": os.environ["TEL_BOT"], "ChatId": os.environ["TEL_CHAT"]},
              "Appwrite": {"Endpoint": "", "ProjectId": "", "ApiKey": "", "BucketId": ""},
              "TelegramStorage": {"BotToken": os.environ["TEL_STORAGE_BOT"], "ChatId": os.environ["TEL_STORAGE_CHAT"]}
          }
          with open("publish/appsettings.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)
          print("appsettings.json generated successfully")
          "@

      - name: Fix web.config for Production
        shell: pwsh
        run: |
          python -c @"
          import os
          with open("publish/web.config") as f:
              content = f.read()
          content = content.replace('stdoutLogEnabled="false"', 'stdoutLogEnabled="true"')
          if "ASPNETCORE_ENVIRONMENT" not in content:
              content = content.replace("</aspNetCore>", '<environmentVariables><environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Production" /></environmentVariables></aspNetCore>')
          os.makedirs("publish/logs", exist_ok=True)
          with open("publish/web.config", "w", encoding="utf-8") as f:
              f.write(content)
          print("web.config updated successfully")
          "@

      - name: Remove stale config files
        shell: bash
        run: |
          rm -f publish/appsettings.Development.json
          rm -f publish/appsettings.Staging.json

      - name: Write version file
        shell: bash
        run: echo "${{ github.sha }}" > publish/version.txt

      - name: Diagnose publish output
        shell: pwsh
        run: |
          Write-Host "=== Files in publish ==="
          Get-ChildItem publish/ | Select-Object Name, Length | Format-Table -AutoSize
          Write-Host ""
          Write-Host "=== appsettings.json (first 200 chars) ==="
          $json = Get-Content publish/appsettings.json -Raw
          Write-Host $json.Substring(0, [Math]::Min(200, $json.Length))
          Write-Host ""
          Write-Host "=== appsettings.json BOM check ==="
          $bytes = [System.IO.File]::ReadAllBytes("publish/appsettings.json")
          Write-Host "First 3 bytes: $($bytes[0]) $($bytes[1]) $($bytes[2]) (expect 123 10 or 123 13 10 = valid JSON start)"
          Write-Host ""
          Write-Host "=== web.config ==="
          Get-Content publish/web.config -Raw
          Write-Host ""
          Write-Host "=== appsettings.Development.json exists? ==="
          Test-Path publish/appsettings.Development.json

      - name: Install Web Deploy
        run: choco install webdeploy -y --no-progress

      - name: Deploy via MSDeploy
        shell: powershell
        run: |
          $source = "${{ github.workspace }}\publish"
          $computerName = 'https://site58252.siteasp.net:8172/msdeploy.axd?site=site58252'
          $username = 'site58252'
          $password = '${{ secrets.MSDEPLOY_PASSWORD }}'
          & "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" `
            -source:contentPath=$source `
            -dest:contentPath=$username,computerName=$computerName,userName=$username,password=$password,authType=Basic,includeAcls=False `
            -allowUntrusted `
            -verb:sync `
            -enableRule:DoNotDeleteRule `
            -enableRule:AppOffline

      - name: Verify deployment
        shell: powershell
        run: |
          Start-Sleep -Seconds 10
          try {
            $r = Invoke-WebRequest -Uri https://uzclinic.runasp.net/health -UseBasicParsing
            Write-Host "Health: $($r.StatusCode) - $($r.Content)"
          } catch {
            Write-Host "Health check failed: $_"
          }
          try {
            $v = Invoke-WebRequest -Uri https://uzclinic.runasp.net/version -UseBasicParsing
            Write-Host "Version: $($v.Content)"
          } catch {
            Write-Host "Version check failed: $_"
          }