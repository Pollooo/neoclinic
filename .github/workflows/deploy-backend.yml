name: Deploy Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'NeoClinic/NeoClinic.Api/**'
      - 'NeoClinic/NeoClinic.Application/**'
      - 'NeoClinic/NeoClinic.Domain/**'
      - 'NeoClinic/NeoClinic.Infrostructure/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore NeoClinic/NeoClinic.Api/NeoClinic.Api.csproj

      - name: Build
        run: dotnet build NeoClinic/NeoClinic.Api/NeoClinic.Api.csproj -c Release

      - name: Publish
        run: dotnet publish NeoClinic/NeoClinic.Api/NeoClinic.Api.csproj -c Release --no-build -o publish

      - name: Generate appsettings.json with secrets
        shell: pwsh
        env:
          DB: ${{ secrets.ConnectionStrings__Database }}
          JWT_KEY: ${{ secrets.Jwt__Key }}
          AZURE: ${{ secrets.AzureBlob__ConnectionString }}
          TEL_BOT: ${{ secrets.Telegram__BotToken }}
          TEL_CHAT: ${{ secrets.Telegram__ChatId }}
          TEL_STORAGE_BOT: ${{ secrets.TelegramStorage__BotToken }}
          TEL_STORAGE_CHAT: ${{ secrets.TelegramStorage__ChatId }}
        run: |
          $data = @{
            Logging = @{ LogLevel = @{ Default = "Information"; "Microsoft.AspNetCore" = "Warning" } }
            ConnectionStrings = @{ Database = $env:DB }
            Firebase = @{ CredentialsPath = "Keys/ServiceAccountKey.json"; BucketName = "clinic-c21c4.firebasestorage.app" }
            Jwt = @{ Key = $env:JWT_KEY; Issuer = "NeoClinic"; Audience = "NeoClinicUsers"; AccessTokenMinutes = 60 }
            AzureBlob = @{ ConnectionString = $env:AZURE; ContainerName = "neo-clinic-docs" }
            Telegram = @{ BotToken = $env:TEL_BOT; ChatId = $env:TEL_CHAT }
            Appwrite = @{ Endpoint = ""; ProjectId = ""; ApiKey = ""; BucketId = "" }
            TelegramStorage = @{ BotToken = $env:TEL_STORAGE_BOT; ChatId = $env:TEL_STORAGE_CHAT }
          }
          $data | ConvertTo-Json -Depth 10 | Set-Content "publish/appsettings.json" -Encoding UTF8
          Write-Host "appsettings.json generated successfully"

      - name: Fix web.config for Production
        shell: pwsh
        run: |
          $webConfigPath = "publish/web.config"
          if (Test-Path $webConfigPath) {
            $content = Get-Content $webConfigPath -Raw

            $content = $content -replace 'stdoutLogEnabled="false"', 'stdoutLogEnabled="true"'

            if ($content -notmatch "ASPNETCORE_ENVIRONMENT") {
              if ($content -match '/>') {
                $content = $content -replace '<aspNetCore\s+([^/]*?)\s*/>', '<aspNetCore $1><environmentVariables><environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Production" /></environmentVariables></aspNetCore>'
              } else {
                $content = $content -replace '</aspNetCore>', '<environmentVariables><environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Production" /></environmentVariables></aspNetCore>'
              }
            }

            $logDir = Join-Path (Split-Path $webConfigPath) "logs"
            New-Item -ItemType Directory -Path $logDir -Force | Out-Null

            Set-Content $webConfigPath -Value $content -Encoding UTF8
            Write-Host "web.config updated successfully"
            Get-Content $webConfigPath -Raw
          } else {
            Write-Host "WARNING: web.config not found in publish output"
          }

      - name: Remove stale config files
        shell: bash
        run: |
          rm -f publish/appsettings.Development.json
          rm -f publish/appsettings.Staging.json

      - name: Write version file
        shell: bash
        run: echo "${{ github.sha }}" > publish/version.txt

      - name: Diagnose publish output
        shell: pwsh
        run: |
          Write-Host "=== Files in publish ==="
          Get-ChildItem publish/ | Select-Object Name, Length | Format-Table -AutoSize
          Write-Host ""
          Write-Host "=== appsettings.json ==="
          Get-Content publish/appsettings.json -Raw
          Write-Host ""
          if (Test-Path publish/web.config) {
            Write-Host "=== web.config ==="
            Get-Content publish/web.config -Raw
          } else {
            Write-Host "=== web.config: NOT FOUND ==="
          }

      - name: Install Web Deploy
        run: choco install webdeploy -y --no-progress

      - name: Deploy via MSDeploy
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $source = "${{ github.workspace }}\publish"
          $computerName = 'https://site58252.siteasp.net:8172/msdeploy.axd?site=site58252'
          $username = 'site58252'
          $password = "${{ secrets.MSDEPLOY_PASSWORD }}"

          Write-Host "Deploying from: $source"
          Write-Host "Target: $computerName"
          Write-Host "Username: $username"

          & "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" `
            -source:contentPath="$source" `
            -dest:contentPath="$username",computerName="$computerName",userName="$username",password="$password",authType=Basic,includeAcls=False `
            -allowUntrusted `
            -verb:sync `
            -enableRule:DoNotDeleteRule `
            -enableRule:AppOffline

          if ($LASTEXITCODE -ne 0) {
            throw "MSDeploy failed with exit code $LASTEXITCODE"
          }
          Write-Host "MSDeploy deployment completed successfully"

      - name: Verify deployment
        shell: powershell
        run: |
          Start-Sleep -Seconds 15
          $r = Invoke-WebRequest -Uri "https://uzclinic.runasp.net/health" -UseBasicParsing -TimeoutSec 30
          Write-Host "Health: $($r.StatusCode) - $($r.Content)"
          if ($r.StatusCode -ne 200) {
            throw "Health check failed with status $($r.StatusCode)"
          }