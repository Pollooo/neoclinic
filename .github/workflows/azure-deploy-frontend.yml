name: Build & Deploy Frontend to Azure

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'NeoClinic/NeoClinic.Web/**'
      - '.github/workflows/azure-deploy-frontend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'NeoClinic/NeoClinic.Web/**'

env:
  REGISTRY_NAME: neoclinicacr
  IMAGE_NAME: neoclinic-web
  DOCKER_BUILDKIT: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} ./NeoClinic/NeoClinic.Web
          docker build -t ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest ./NeoClinic/NeoClinic.Web
      
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}
      
      - name: Push image to ACR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker push ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
      
      - name: Azure Login
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Update App Service to use new image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          az webapp config container set \
            --name neoclinic-web-prod \
            --resource-group clinic-project \
            --container-image-name ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          
          az webapp restart \
            --name neoclinic-web-prod \
            --resource-group clinic-project

