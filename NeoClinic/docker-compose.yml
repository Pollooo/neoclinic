services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__Database=${DB_CONNECTION_STRING}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=NeoClinic
      - Jwt__Audience=NeoClinicUsers
      - Jwt__AccessTokenMinutes=60
      - AzureBlob__ConnectionString=${AZURE_BLOB_CONNECTION}
      - AzureBlob__ContainerName=neo-clinic-docs
      - Telegram__BotToken=${TELEGRAM_BOT_TOKEN}
      - Telegram__ChatId=${TELEGRAM_CHAT_ID}
    restart: unless-stopped
